apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quest-diagnostics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akshay-eng/demo-app-manifests.git
    targetRevision: main
    path: base
  destination:
    server: https://kubernetes.default.svc
    namespace: quest-diagnostics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
