apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-quest-config
  namespace: monitoring
data:
  quest-route.yaml: |
    # Add this route to your AlertManager config
    # Route config:
    route:
      receiver: 'quest-agent-webhook'
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 5m
      matchers:
        - team = quest-devops

    # Receiver config:
    receivers:
      - name: 'quest-agent-webhook'
        webhook_configs:
          - url: 'http://quest-remediation-agent:5000/webhook/alert'
            send_resolved: true
