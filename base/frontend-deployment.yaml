apiVersion: apps/v1
kind: Deployment
metadata:
  name: quest-lab-frontend
  namespace: quest-diagnostics
  labels:
    app: quest-lab-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quest-lab-frontend
  template:
    metadata:
      labels:
        app: quest-lab-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: ak3hay/quest-lab-frontend:f66ee844c2ffb7e6b61270badc100f550a84e9e5
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: quest-diagnostics
spec:
  selector:
    app: quest-lab-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
