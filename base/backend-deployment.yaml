apiVersion: apps/v1
kind: Deployment
metadata:
  name: quest-lab-backend
  namespace: quest-diagnostics
  labels:
    app: quest-lab-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quest-lab-backend
  template:
    metadata:
      labels:
        app: quest-lab-backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: ak3hay/quest-lab-backend:d306bae6710f9b5e7378a0918e35a7ea695a8dd0
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb:27017"
            - name: DB_NAME
              value: "quest_diagnostics"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: quest-diagnostics
spec:
  selector:
    app: quest-lab-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
